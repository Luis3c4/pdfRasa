flows:
  greeting:
    description: "el usuario saluda o inicia la conversación. Frases como: hola, buenos días, buenas tardes, buenas noches, hi, hey, qué tal, buen día"
    name: saludo
    steps:
      - action: utter_greet
        next: show_catalog
      - id: show_catalog
        action: action_show_catalog
        next: END

  pattern_cannot_handle:
    description: "el bot no puede manejar el mensaje del usuario"
    name: no puedo ayudar
    steps:
      - action: action_cannot_handle

  pattern_out_of_scope:
    description: "el usuario pregunta algo fuera del alcance del bot"
    name: fuera de alcance
    steps:
      - action: action_free_response

  pattern_completed:
    description: "flujo que se ejecuta cuando el usuario completa un caso de uso"
    name: completado
    steps:
      - noop: true
        next: END

  pattern_continue_interrupted:
    description: "flujo de reparación cuando el usuario cambia de tema"
    name: continuar flujo interrumpido
    steps:
      - action: action_cancel_interrupted_flows
        next: END

  pattern_correction:
    description: "flujo de corrección de slots"
    name: corrección
    steps:
      - noop: true
        next: END
