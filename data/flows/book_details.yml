flows:
  book_details:
    description: "muestra información detallada del único ebook disponible. En este catálogo solo existe '200 recetas KETO'. Se activa cuando el usuario pide ver el detalle completo o el preview del libro, o cuando solicita explícitamente una vista detallada del producto. No se usa para preguntas rápidas de FAQ (por ejemplo: páginas, precio, método de pago); esas deben resolverse con respuesta libre (offtopic reply). No se usa para mensajes de compra como 'quiero comprarlo', 'comprarlo' o 'lo quiero'; para eso usar el flow 'comprar un ebook'. No se activa para ver el catálogo completo. No existe ningún flow llamado 'provide_info'; usar este flow para solicitudes de detalle completo del libro."
    name: ver detalles de un libro
    steps:
      - action: action_resolve_book
        next:
          - if: "slots.selected_book_id is not null"
            then: get_details
          - else: ask_book_name
      - id: ask_book_name
        collect: "selected_book_id"
        description: "el nombre o identificador del libro sobre el que el usuario quiere información"
        next: get_details
      - id: get_details
        action: action_get_book_details
        next:
          - if: "slots.return_value = 'not_found'"
            then:
              - action: utter_book_not_found
                next: show_catalog_on_not_found
          - else: show_preview
      - id: show_catalog_on_not_found
        action: action_show_catalog
        next: END
      - id: show_preview
        action: utter_book_purchase_preview
        next: confirm_purchase
      - id: confirm_purchase
        collect: "purchase_confirmation"
        description: "Confirma si el usuario quiere proceder con la compra. Establece true si el usuario dice: sí, si, yes, confirmo, quiero, acepto, correcto, ok, dale, vamos, proceder. Establece false si dice: no, cancelar, no quiero, mejor no."
        ask_before_filling: true
        rejections:
          - if: "slots.purchase_confirmation is null"
            utter: utter_ask_purchase_confirmation
        next:
          - if: "slots.purchase_confirmation is not true"
            then:
              - action: utter_purchase_cancelled
                next: reset_slots
          - else:
              - action: action_clear_payment_state
                next: show_payment_instructions
      - id: reset_slots
        action: action_reset_purchase_slots
        next: END
      - id: show_payment_instructions
        action: utter_payment_instructions
        next: wait_for_screenshot
      - id: wait_for_screenshot
        collect: payment_screenshot_url
        description: "el usuario envía la captura de pantalla de su pago como imagen adjunta"
        ask_before_filling: true
        next: validate_screenshot
      - id: validate_screenshot
        action: validate_payment_screenshot_url
        next:
          - if: "slots.payment_screenshot_url is null"
            then: wait_for_screenshot
          - if: "slots.payment_validation_status = 'approved'"
            then: create_order
          - if: "slots.payment_validation_status = 'needs_review'"
            then: create_order_pending
          - else: ocr_rejected
      - id: create_order
        action: action_create_order
        next:
          - if: "slots.return_value = 'error'"
            then:
              - action: utter_purchase_error
                next: END
          - else: release_download
      - id: release_download
        action: action_release_download
        next: END
      - id: ocr_rejected
        action: utter_payment_ocr_rejected
        next: wait_for_screenshot
      - id: create_order_pending
        action: action_create_order
        next:
          - if: "slots.return_value = 'error'"
            then:
              - action: utter_purchase_error
                next: END
          - else: escalate_human
      - id: escalate_human
        action: action_escalate_to_human
        next: END
